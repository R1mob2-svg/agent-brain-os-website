<svg width="1600" height="820" viewBox="0 0 1600 820" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Brain OS operating system architecture visual</title>
  <desc id="desc">A premium system map showing doctrine, repository memory, proof receipts, handoffs, and shared learning connected around a GitHub-backed operating brain.</desc>
  <defs>
    <linearGradient id="bg" x1="150" y1="80" x2="1460" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10203A"/>
      <stop offset="0.54" stop-color="#08111C"/>
      <stop offset="1" stop-color="#040910"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#11243C" stop-opacity="0.97"/>
      <stop offset="1" stop-color="#091420" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="panelSoft" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0E1E31" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#07111C" stop-opacity="0.82"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#99EEFF"/>
      <stop offset="1" stop-color="#248AB2"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDCD7D"/>
      <stop offset="1" stop-color="#9D772F"/>
    </linearGradient>
