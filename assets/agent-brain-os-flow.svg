      <stop stop-color="#56D8FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#56D8FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1210 560) rotate(132) scale(320 260)">
      <stop stop-color="#E5BB63" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#E5BB63" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-120" y="-120" width="1840" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

