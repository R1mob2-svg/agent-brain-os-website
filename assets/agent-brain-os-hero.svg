  <text x="624" y="538" fill="#E5C982" font-family="Space Grotesk, Arial, sans-serif" font-size="16" font-weight="700">PRESERVED LEARNING</text>
  <text x="624" y="572" fill="#EEF6FF" font-family="Space Grotesk, Arial, sans-serif" font-size="24" font-weight="700">Future runs inherit context</text>
  <text x="624" y="606" fill="#9CB3C8" font-family="Arial, sans-serif" font-size="15">Mistakes become rules.</text>

