    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(236 184) rotate(32.4712) scale(261.433 243.658)">
      <stop stop-color="#56D9FF" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#56D9FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(744 668) rotate(147.274) scale(249.263 241.605)">
      <stop stop-color="#D7B36B" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#D7B36B" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-120" y="-120" width="1200" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
  </defs>

