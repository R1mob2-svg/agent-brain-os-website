  <text x="624" y="288" fill="#9CB3C8" font-family="Arial, sans-serif" font-size="15">Repo boundaries checked.</text>
  <text x="624" y="311" fill="#9CB3C8" font-family="Arial, sans-serif" font-size="15">No fake completion claims.</text>

