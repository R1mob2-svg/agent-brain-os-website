  <rect x="86" y="610" width="470" height="118" rx="28" fill="#08121F" stroke="#17304A" stroke-width="2"/>
  <text x="116" y="652" fill="#7FE4FF" font-family="Space Grotesk, Arial, sans-serif" font-size="16" font-weight="700">WHY THIS WORKS</text>
  <text x="116" y="688" fill="#EEF6FF" font-family="Space Grotesk, Arial, sans-serif" font-size="30" font-weight="700">Memory + doctrine + receipts + handoffs</text>
  <text x="116" y="716" fill="#A7BDD2" font-family="Arial, sans-serif" font-size="15">A serious builder tool, not a vague prompt folder.</text>
