<svg width="960" height="840" viewBox="0 0 960 840" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Agent Brain OS technical workspace illustration</title>
  <desc id="desc">An abstract premium technical workspace showing code panes, doctrine cards, repo links, structured receipts, and preserved learning.</desc>
  <defs>
    <linearGradient id="bg" x1="96" y1="84" x2="864" y2="756" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F1D33"/>
      <stop offset="0.5" stop-color="#0A1424"/>
      <stop offset="1" stop-color="#050B14"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#13243C" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0A1422" stop-opacity="0.98"/>
    </linearGradient>
    <linearGradient id="cyanStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6FE2FF"/>
      <stop offset="1" stop-color="#2E9BC8"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#E5C982"/>
      <stop offset="1" stop-color="#9C7A32"/>
